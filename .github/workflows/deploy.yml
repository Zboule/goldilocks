name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: ui
        run: pnpm build

      - name: Write CNAME for custom domain
        run: echo "goldi.zone" > ui/dist/CNAME

      - name: Download tiles and static assets from release
        run: |
          gh release download v3.0.0 --repo Zboule/goldilocks \
            --pattern "tiles-*.tar.gz" --dir /tmp --clobber
          gh release download v3.0.0 --repo Zboule/goldilocks \
            --pattern "static-assets.tar.gz" --dir /tmp --clobber
          mkdir -p ui/dist/tiles
          tar -xzf /tmp/tiles-*.tar.gz -C ui/dist/tiles/
          tar -xzf /tmp/static-assets.tar.gz --strip-components=2 \
            -C ui/dist/tiles/ data/tiles/tile_shapes.bin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
